<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenAlex Topics Tree</title>
    <style>
        :root {
            /* Dark theme (default) */
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #16213e;
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-mid: #16213e;
            --bg-gradient-end: #0f3460;
            --bg-card: rgba(255, 255, 255, 0.05);
            --bg-input: #1a1a2e;
            --bg-hover: rgba(100, 255, 218, 0.05);
            --bg-hierarchy: rgba(100, 255, 218, 0.05);
            --text-primary: #e0e0e0;
            --text-secondary: #8892b0;
            --text-accent: #64ffda;
            --text-accent-secondary: #7ee8fa;
            --text-title: #ccd6f6;
            --text-subfield: #98a8c8;
            --border-color: #1a1a2e;
            --border-accent: #1a3a5c;
            --btn-bg: #64ffda;
            --btn-text: #0f0f23;
            --btn-hover: #4fd1b5;
            --highlight-bg: #ffd700;
            --highlight-text: #000;
            --highlight-node-bg: rgba(100, 255, 218, 0.15);
            --highlight-node-border: #64ffda;
            --scrollbar-track: #0f0f23;
            --scrollbar-thumb: #1a1a2e;
            --scrollbar-thumb-hover: #2a2a3e;
        }

        [data-theme="light"] {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #e8f0fe;
            --bg-gradient-start: #e8f0fe;
            --bg-gradient-mid: #f0f4f8;
            --bg-gradient-end: #d4e4fc;
            --bg-card: rgba(0, 0, 0, 0.03);
            --bg-input: #ffffff;
            --bg-hover: rgba(0, 150, 136, 0.05);
            --bg-hierarchy: rgba(0, 150, 136, 0.05);
            --text-primary: #333333;
            --text-secondary: #666666;
            --text-accent: #009688;
            --text-accent-secondary: #00897b;
            --text-title: #1a1a2e;
            --text-subfield: #5f6368;
            --border-color: #e0e0e0;
            --border-accent: #c0c0c0;
            --btn-bg: #009688;
            --btn-text: #ffffff;
            --btn-hover: #00796b;
            --highlight-bg: #ffd700;
            --highlight-text: #000;
            --highlight-node-bg: rgba(0, 150, 136, 0.15);
            --highlight-node-border: #009688;
            --scrollbar-track: #f0f0f0;
            --scrollbar-thumb: #c0c0c0;
            --scrollbar-thumb-hover: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            scroll-behavior: smooth;
            transition: background-color 0.3s, color 0.3s;
        }

        .app {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .hero-section {
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-mid) 50%, var(--bg-gradient-end) 100%);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 30px;
            border: 1px solid var(--border-accent);
        }

        .hero-title {
            font-size: 2.5rem;
            color: var(--text-accent);
            margin-bottom: 15px;
            text-align: center;
        }

        .hero-subtitle {
            color: var(--text-secondary);
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 30px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        .info-card h3 {
            color: var(--text-accent);
            font-size: 1.1rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 8px;
        }

        .info-card ul {
            list-style: none;
            padding-left: 0;
            margin-top: 10px;
        }

        .info-card ul li {
            color: var(--text-secondary);
            font-size: 0.9rem;
            padding: 4px 0;
            padding-left: 20px;
            position: relative;
        }

        .info-card ul li::before {
            content: '▸';
            position: absolute;
            left: 0;
            color: var(--text-accent);
        }

        .hierarchy-visual {
            background-color: var(--bg-hierarchy);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }

        .hierarchy-level {
            padding: 4px 0;
            color: var(--text-secondary);
        }

        .hierarchy-level .level-icon {
            color: var(--text-accent);
            margin-right: 8px;
        }

        .jump-button {
            display: block;
            width: fit-content;
            margin: 0 auto;
            background: linear-gradient(135deg, var(--btn-bg) 0%, var(--btn-hover) 100%);
            color: var(--btn-text);
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
        }

        .jump-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(100, 255, 218, 0.3);
        }

        .jump-button:active {
            transform: translateY(0);
        }

        .settings-bar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .setting-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .setting-btn:hover {
            background: var(--bg-hover);
            border-color: var(--text-accent);
        }

        .lang-dropdown {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .main-content {
            margin-top: 30px;
        }

        .search-container {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 600px;
        }

        .search-input {
            flex: 1;
            padding: 12px 16px;
            font-size: 1rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--bg-input);
            color: var(--text-primary);
            transition: border-color 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--text-accent);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-button,
        .clear-button {
            padding: 12px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .search-button {
            background-color: var(--btn-bg);
            color: var(--btn-text);
            font-weight: 600;
        }

        .search-button:hover {
            background-color: var(--btn-hover);
        }

        .clear-button {
            background-color: var(--bg-secondary);
            color: var(--text-secondary);
            padding: 12px 16px;
        }

        .clear-button:hover {
            background-color: var(--border-color);
            color: var(--text-primary);
        }

        .searching-indicator {
            color: var(--text-accent);
            font-size: 0.9rem;
        }

        .search-results-count {
            color: var(--text-accent);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .main-content {
            background-color: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            min-height: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .tree-view {
            font-size: 0.95rem;
        }

        .tree-node {
            margin: 2px 0;
        }

        .tree-node-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 4px;
            cursor: default;
            transition: background-color 0.2s;
        }

        .tree-node-header:hover {
            background-color: var(--bg-hover);
        }

        .tree-node-header[role="button"] {
            cursor: pointer;
        }

        .tree-node-header[role="button"]:hover {
            background-color: rgba(100, 255, 218, 0.1);
        }

        .expand-icon {
            font-size: 0.7rem;
            color: var(--text-accent);
            width: 16px;
            text-align: center;
            flex-shrink: 0;
        }

        .node-icon {
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .node-name {
            flex: 1;
            font-weight: 500;
        }

        .works-count {
            color: var(--text-secondary);
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .node-stats {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-left: 10px;
        }

        .stat-item {
            color: var(--text-accent);
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .openalex-btn {
            background: none;
            border: 1px solid var(--text-accent);
            border-radius: 4px;
            cursor: pointer;
            padding: 2px 6px;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .openalex-btn:hover {
            background-color: var(--text-accent);
            color: var(--bg-primary);
        }

        .tree-children {
            margin-top: 2px;
        }

        .highlight {
            background-color: var(--highlight-bg);
            color: var(--highlight-text);
            padding: 0 2px;
            border-radius: 2px;
            font-weight: 600;
        }

        .highlighted {
            background-color: var(--highlight-node-bg) !important;
            border-left: 3px solid var(--highlight-node-border);
            padding-left: 5px;
        }

        /* Type-based styles */
        [data-type="domain"] .node-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-accent);
        }

        [data-type="field"] .node-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-accent-secondary);
        }

        [data-type="subfield"] .node-name {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-subfield);
        }

        [data-type="topic"] .node-name {
            font-size: 0.95rem;
            font-weight: 400;
            color: var(--text-title);
        }

        /* Scrollbar styles */
        .main-content::-webkit-scrollbar {
            width: 10px;
        }

        .main-content::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
            border-radius: 5px;
        }

        .main-content::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 5px;
        }

        .main-content::-webkit-scrollbar-thumb:hover {
            background: var(--scrollbar-thumb-hover);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app {
                padding: 15px;
            }

            .hero-title {
                font-size: 2rem;
            }

            .search-bar {
                flex-direction: column;
            }

            .main-content {
                padding: 15px;
            }
        }
    </style>
</head>

        function useI18n() {
            const [lang, setLang] = useState(() => {
                const saved = localStorage.getItem('openalex-lang');
                return saved || 'en';
            });

            useEffect(() => {
                localStorage.setItem('openalex-lang', lang);
                document.documentElement.lang = lang;
            }, [lang]);

            const t = useCallback((key) => {
                const dict = translations[lang] || translations.en;
                return dict[key] !== undefined ? dict[key] : (translations.en[key] || key);
            }, [lang]);

            return { lang, setLang, t };
        }

        function useTheme() {
            const [theme, setTheme] = useState(() => {
                const saved = localStorage.getItem('openalex-theme');
                return saved || 'dark';
            });

            useEffect(() => {
                localStorage.setItem('openalex-theme', theme);
                document.documentElement.setAttribute('data-theme', theme);
            }, [theme]);

            return { theme, setTheme };
        }

        // Fetch data
        let treeData = null;
        let searchData = null;

        async function loadData() {
            try {
                const [treeRes, searchRes] = await Promise.all([
                    fetch('/data/topics-tree.json'),
                    fetch('/data/search-index.json')
                ]);
                treeData = await treeRes.json();
                searchData = await searchRes.json();
                console.log('Data loaded:', treeData.name, searchData.length, 'search entries');
            } catch (error) {
                console.error('Failed to load data:', error);
            }
        }

        // TreeNode Component
        function TreeNodeComponent({ node, level, defaultExpandLevel, expandedNodes, searchResults, searchQuery, t }) {
            // Use node.id as key to force re-render when expandedNodes changes
            const [isExpanded, setIsExpanded] = useState(() => {
                if (expandedNodes && expandedNodes.has(node.name)) {
                    return true;
                }
                return defaultExpandLevel ? level < defaultExpandLevel : false;
            });

            // Update expansion state when expandedNodes changes
            useEffect(() => {
                if (expandedNodes && expandedNodes.has(node.name)) {
                    setIsExpanded(true);
                }
            }, [expandedNodes, node.name]);

            const hasChildren = node.children && node.children.length > 0;
            
            const isHighlighted = searchResults && searchResults.some(r => 
                r.path.includes(node.name) || r.id === node.id
            );

            const toggleExpand = () => {
                setIsExpanded(!isExpanded);
            };

            const getIcon = () => {
                switch (node.type) {
                    case 'domain': return '🌐';
                    case 'field': return '📚';
                    case 'subfield': return '📖';
                    case 'topic': return '📄';
                    default: return '📁';
                }
            };

            const openInOpenAlex = (e) => {
                e.stopPropagation();
                const topicId = node.id;
                let url;
                if (topicId.startsWith('https://openalex.org/')) {
                    url = topicId;
                } else {
                    url = `https://openalex.org/${topicId}`;
                }
                window.open(url, '_blank');
            };

            const formatNumber = (num) => {
                if (num === undefined || num === null) return '';
                if (num >= 1000000) {
                    return (num / 1000000).toFixed(1) + 'M';
                }
                if (num >= 1000) {
                    return (num / 1000).toFixed(1) + 'K';
                }
                return num.toLocaleString();
            };

            const highlightText = (text, query) => {
                if (!query || !text) return text;
                const lowerText = text.toLowerCase();
                const lowerQuery = query.toLowerCase();
                const index = lowerText.indexOf(lowerQuery);
                if (index === -1) return text;

                const before = text.slice(0, index);
                const match = text.slice(index, index + query.length);
                const after = text.slice(index + query.length);

                return React.createElement('span', null,
                    before,
                    React.createElement('span', { className: 'highlight', style: { backgroundColor: '#ffd700', color: '#000', padding: '0 2px', borderRadius: '2px' } }, match),
                    after
                );
            };

            // Filter children to only show matching paths when in search mode
            // This ensures we only show the matched nodes and their ancestors, not sibling nodes
            const filteredChildren = React.useMemo(() => {
                // If no search results, show all children normally
                if (!hasChildren || !searchResults || searchResults.length === 0) {
                    return node.children || [];
                }

                // Build sets for matching topics and valid paths
                const topicIds = new Set();
                
                searchResults.forEach(result => {
                    topicIds.add(result.id);
                });

                // Special case for root node: show domains that have matching topics
                if (node.type === 'root') {
                    const matchingDomains = new Set();
                    searchResults.forEach(result => {
                        if (result.path.length > 0) {
                            matchingDomains.add(result.path[0]);
                        }
                    });
                    return (node.children || []).filter(child => {
                        return matchingDomains.has(child.name);
                    });
                }

                // For topic nodes, check if this specific topic is in the search results
                if (node.type === 'topic') {
                    const isMatch = topicIds.has(node.id);
                    return isMatch ? (node.children || []) : [];
                }

                // For non-topic nodes (domain, field, subfield)
                // Determine the level of this node (1=domain, 2=field, 3=subfield)
                // Path structure: [domain(0), field(1), subfield(2), topic(3)]
                const pathIndex = node.type === 'domain' ? 0 : 
                                  node.type === 'field' ? 1 : 
                                  node.type === 'subfield' ? 2 : -1;

                if (pathIndex === -1) {
                    return [];
                }

                // Check if this node appears at the correct position in any valid path
                const nodeInAnyPath = searchResults.some(result => {
                    if (result.path.length <= pathIndex) return false;
                    return result.path[pathIndex] === node.name;
                });

                if (!nodeInAnyPath) {
                    return [];
                }

                // This node is in a valid path at the correct position
                // Show only children that are also in valid paths
                // Children are always at pathIndex + 1 in the path array
                const childPathIndex = pathIndex + 1;
                const validChildNames = new Set();
                
                searchResults.forEach(result => {
                    // Check if this result's path matches the current node's position
                    if (result.path.length > pathIndex && result.path[pathIndex] === node.name) {
                        // The next element in the path is a valid child
                        if (result.path.length > childPathIndex) {
                            validChildNames.add(result.path[childPathIndex]);
                        }
                    }
                });

                return (node.children || []).filter(child => {
                    // For topic children, check by ID
                    if (child.type === 'topic') {
                        return topicIds.has(child.id);
                    }
                    // For non-topic children, check by name
                    return validChildNames.has(child.name);
                });
            }, [node.children, searchResults, node.name, node.type, level]);

            return React.createElement('div', {
                className: 'tree-node',
                style: { marginLeft: `${level * 20}px` },
                'data-type': node.type
            },
                React.createElement('div', {
                    className: `tree-node-header ${isHighlighted ? 'highlighted' : ''}`,
                    onClick: hasChildren ? toggleExpand : undefined,
                    role: hasChildren ? 'button' : undefined,
                    tabIndex: 0
                },
                    hasChildren && React.createElement('span', { className: 'expand-icon' }, isExpanded ? '▼' : '▶'),
                    React.createElement('span', { className: 'node-icon' }, getIcon()),
                    React.createElement('span', { className: 'node-name' }, highlightText(node.name, searchQuery)),
                    React.createElement('span', { className: 'node-stats' },
                        node.works_count !== undefined && React.createElement('span', { className: 'stat-item', title: t('worksCountTitle') },
                            `📚 ${formatNumber(node.works_count)}`
                        ),
                        node.topic_count !== undefined && React.createElement('span', { className: 'stat-item', title: t('topicCountTitle') },
                            `📄 ${node.topic_count}`
                        ),
                        node.type !== 'root' && React.createElement('button', {
                            className: 'openalex-btn',
                            onClick: openInOpenAlex,
                            title: t('openAlexTitle')
                        }, '🔗')
                    )
                ),
                isExpanded && filteredChildren.length > 0 && React.createElement('div', { className: 'tree-children' },
                    filteredChildren.map(child => 
                        React.createElement(TreeNodeComponent, {
                            key: child.id,
                            node: child,
                            level: level + 1,
                            defaultExpandLevel: defaultExpandLevel,
                            expandedNodes: expandedNodes,
                            searchResults: searchResults,
                            searchQuery: searchQuery,
                            t: t
                        })
                    )
                )
            );
        }

        // TreeView Component
        function TreeView({ tree, defaultExpandLevel = 2, expandedNodes, searchResults, searchQuery, t }) {
            return React.createElement('div', { className: 'tree-view' },
                React.createElement(TreeNodeComponent, {
                    node: tree,
                    level: 0,
                    defaultExpandLevel: defaultExpandLevel,
                    expandedNodes: expandedNodes,
                    searchResults: searchResults,
                    searchQuery: searchQuery,
                    t: t
                })
            );
        }

        // App Component
        function App() {
            const { lang, setLang, t } = useI18n();
            const { theme, setTheme } = useTheme();
            const [tree, setTree] = useState(null);
            const [searchResults, setSearchResults] = useState([]);
            const [isSearching, setIsSearching] = useState(false);
            const [expandedNodes, setExpandedNodes] = useState(new Set());
            const [searchQuery, setSearchQuery] = useState('');
            const [searchCounter, setSearchCounter] = useState(0);

            useEffect(() => {
                loadData().then(() => {
                    setTree(treeData);
                });
            }, []);

            const searchTopics = useCallback((query) => {
                if (!query.trim()) {
                    setSearchResults([]);
                    setExpandedNodes(new Set());
                    return;
                }

                setIsSearching(true);
                const lowerQuery = query.toLowerCase();
                
                const matches = [];
                
                searchData.forEach(item => {
                    // Only search in topic name, not in description or keywords
                    if (item.name.toLowerCase().includes(lowerQuery)) {
                        const path = [item.domain, item.field, item.subfield, item.name].filter(Boolean);
                        matches.push({
                            id: item.id,
                            path: path
                        });
                    }
                });

                const nodesToExpand = new Set();
                matches.forEach(result => {
                    result.path.forEach(nodeName => {
                        nodesToExpand.add(nodeName);
                    });
                });

                setSearchResults(matches);
                setExpandedNodes(nodesToExpand);
                setSearchCounter(c => c + 1); // Force re-render
                setIsSearching(false);
            }, []);

            const handleSearch = () => {
                searchTopics(searchQuery);
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    handleSearch();
                }
            };

            const handleClear = () => {
                setSearchQuery('');
                searchTopics('');
            };

            return React.createElement('div', { className: 'app' },
                React.createElement('section', { className: 'hero-section' },
                    React.createElement('div', { className: 'settings-bar' },
                        React.createElement('select', {
                            value: lang,
                            onChange: (e) => setLang(e.target.value),
                            className: 'lang-dropdown',
                            title: t('languageLabel')
                        },
                            React.createElement('option', { value: 'en' }, 'English'),
                            React.createElement('option', { value: 'zh' }, '中文'),
                            React.createElement('option', { value: 'ja' }, '日本語')
                        ),
                        React.createElement('button', {
                            className: 'setting-btn',
                            onClick: () => setTheme(theme === 'dark' ? 'light' : 'dark'),
                            title: t('themeLabel')
                        }, theme === 'dark' ? '☀️ ' + t('lightTheme') : '🌙 ' + t('darkTheme'))
                    ),
                    React.createElement('h1', { className: 'hero-title' }, t('title')),
                    React.createElement('p', { className: 'hero-subtitle' }, t('subtitle')),
                    
                    React.createElement('div', { className: 'info-grid' },
                        React.createElement('div', { className: 'info-card' },
                            React.createElement('h3', null, '📚 ' + t('whatIsOpenAlex')),
                            React.createElement('p', null, t('openAlexDesc')),
                            React.createElement('p', null, t('learnMore'), ' ', React.createElement('a', { href: 'https://openalex.org', target: '_blank', style: { color: 'var(--text-accent)' } }, 'openalex.org'))
                        ),
                        
                        React.createElement('div', { className: 'info-card' },
                            React.createElement('h3', null, '🏷️ ' + t('whatAreTopics')),
                            React.createElement('p', null, t('topicsDesc')),
                            React.createElement('ul', null,
                                React.createElement('li', null, t('topicFeature1')),
                                React.createElement('li', null, t('topicFeature2')),
                                React.createElement('li', null, t('topicFeature3'))
                            )
                        ),
                        
                        React.createElement('div', { className: 'info-card' },
                            React.createElement('h3', null, '🌳 ' + t('treeStructure')),
                            React.createElement('p', null, t('treeDesc')),
                            React.createElement('div', { className: 'hierarchy-visual' },
                                React.createElement('div', { className: 'hierarchy-level' }, 
                                    React.createElement('span', { className: 'level-icon' }, '🌐'),
                                    t('hierarchyDomain')
                                ),
                                React.createElement('div', { className: 'hierarchy-level' }, 
                                    React.createElement('span', { className: 'level-icon' }, '📚'),
                                    t('hierarchyField')
                                ),
                                React.createElement('div', { className: 'hierarchy-level' }, 
                                    React.createElement('span', { className: 'level-icon' }, '📖'),
                                    t('hierarchySubfield')
                                ),
                                React.createElement('div', { className: 'hierarchy-level' }, 
                                    React.createElement('span', { className: 'level-icon' }, '📄'),
                                    t('hierarchyTopic')
                                )
                            )
                        ),
                        
                        React.createElement('div', { className: 'info-card' },
                            React.createElement('h3', null, '🔍 ' + t('howToUse')),
                            React.createElement('p', null, t('howToUseDesc')),
                            React.createElement('ul', null,
                                React.createElement('li', null, t('usageTip1')),
                                React.createElement('li', null, t('usageTip2')),
                                React.createElement('li', null, t('usageTip3'))
                            )
                        )
                    ),
                    
                    React.createElement('a', { 
                        href: '#tree-content', 
                        className: 'jump-button',
                        onClick: (e) => {
                            e.preventDefault();
                            document.getElementById('tree-content')?.scrollIntoView({ behavior: 'smooth' });
                        }
                    }, '↓ ' + t('jumpButton'))
                ),
                
                React.createElement('div', { className: 'search-container' },
                    React.createElement('div', { className: 'search-bar' },
                        React.createElement('input', {
                            type: 'text',
                            value: searchQuery,
                            onChange: (e) => setSearchQuery(e.target.value),
                            onKeyDown: handleKeyDown,
                            placeholder: t('searchPlaceholder'),
                            className: 'search-input'
                        }),
                        React.createElement('button', { onClick: handleSearch, className: 'search-button' }, t('searchButton')),
                        searchQuery && React.createElement('button', { onClick: handleClear, className: 'clear-button' }, '✕')
                    ),
                    isSearching && React.createElement('div', { className: 'searching-indicator' }, t('searching')),
                    searchResults.length > 0 && !isSearching && 
                        React.createElement('div', { className: 'search-results-count' }, 
                            t('foundTopics')(searchResults.length)
                        )
                ),
                React.createElement('main', { id: 'tree-content', className: 'main-content' },
                    tree ? 
                        React.createElement(TreeView, {
                            key: searchCounter,
                            tree: tree,
                            defaultExpandLevel: searchResults.length > 0 ? undefined : 2,
                            expandedNodes: expandedNodes,
                            searchResults: searchResults,
                            searchQuery: searchQuery,
                            t: t
                        }) :
                        React.createElement('div', { className: 'loading' }, t('loading'))
                )
            );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
