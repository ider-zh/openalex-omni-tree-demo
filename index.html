<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenAlex Topics Tree</title>
    <style>
        :root {
            /* Dark theme (default) */
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #16213e;
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-mid: #16213e;
            --bg-gradient-end: #0f3460;
            --bg-card: rgba(255, 255, 255, 0.05);
            --bg-input: #1a1a2e;
            --bg-hover: rgba(100, 255, 218, 0.05);
            --bg-hierarchy: rgba(100, 255, 218, 0.05);
            --text-primary: #e0e0e0;
            --text-secondary: #8892b0;
            --text-accent: #64ffda;
            --text-accent-secondary: #7ee8fa;
            --text-title: #ccd6f6;
            --text-subfield: #98a8c8;
            --border-color: #1a1a2e;
            --border-accent: #1a3a5c;
            --btn-bg: #64ffda;
            --btn-text: #0f0f23;
            --btn-hover: #4fd1b5;
            --highlight-bg: #ffd700;
            --highlight-text: #000;
            --highlight-node-bg: rgba(100, 255, 218, 0.15);
            --highlight-node-border: #64ffda;
            --scrollbar-track: #0f0f23;
            --scrollbar-thumb: #1a1a2e;
            --scrollbar-thumb-hover: #2a2a3e;
        }

        [data-theme="light"] {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #e8f0fe;
            --bg-gradient-start: #e8f0fe;
            --bg-gradient-mid: #f0f4f8;
            --bg-gradient-end: #d4e4fc;
            --bg-card: rgba(0, 0, 0, 0.03);
            --bg-input: #ffffff;
            --bg-hover: rgba(0, 150, 136, 0.05);
            --bg-hierarchy: rgba(0, 150, 136, 0.05);
            --text-primary: #333333;
            --text-secondary: #666666;
            --text-accent: #009688;
            --text-accent-secondary: #00897b;
            --text-title: #1a1a2e;
            --text-subfield: #5f6368;
            --border-color: #e0e0e0;
            --border-accent: #c0c0c0;
            --btn-bg: #009688;
            --btn-text: #ffffff;
            --btn-hover: #00796b;
            --highlight-bg: #ffd700;
            --highlight-text: #000;
            --highlight-node-bg: rgba(0, 150, 136, 0.15);
            --highlight-node-border: #009688;
            --scrollbar-track: #f0f0f0;
            --scrollbar-thumb: #c0c0c0;
            --scrollbar-thumb-hover: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            scroll-behavior: smooth;
            transition: background-color 0.3s, color 0.3s;
        }

        .app {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .hero-section {
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-mid) 50%, var(--bg-gradient-end) 100%);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 30px;
            border: 1px solid var(--border-accent);
        }

        .hero-title {
            font-size: 2.5rem;
            color: var(--text-accent);
            margin-bottom: 15px;
            text-align: center;
        }

        .hero-subtitle {
            color: var(--text-secondary);
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 30px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        .info-card h3 {
            color: var(--text-accent);
            font-size: 1.1rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 8px;
        }

        .info-card ul {
            list-style: none;
            padding-left: 0;
            margin-top: 10px;
        }

        .info-card ul li {
            color: var(--text-secondary);
            font-size: 0.9rem;
            padding: 4px 0;
            padding-left: 20px;
            position: relative;
        }

        .info-card ul li::before {
            content: '▸';
            position: absolute;
            left: 0;
            color: var(--text-accent);
        }

        .hierarchy-visual {
            background-color: var(--bg-hierarchy);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }

        .hierarchy-level {
            padding: 4px 0;
            color: var(--text-secondary);
        }

        .hierarchy-level .level-icon {
            color: var(--text-accent);
            margin-right: 8px;
        }

        .jump-button {
            display: block;
            width: fit-content;
            margin: 0 auto;
            background: linear-gradient(135deg, var(--btn-bg) 0%, var(--btn-hover) 100%);
            color: var(--btn-text);
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
        }

        .jump-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(100, 255, 218, 0.3);
        }

        .jump-button:active {
            transform: translateY(0);
        }

        .settings-bar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .setting-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .setting-btn:hover {
            background: var(--bg-hover);
            border-color: var(--text-accent);
        }

        .lang-dropdown {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .main-content {
            margin-top: 30px;
        }

        .search-container {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 600px;
        }

        .search-input {
            flex: 1;
            padding: 12px 16px;
            font-size: 1rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--bg-input);
            color: var(--text-primary);
            transition: border-color 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--text-accent);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .tree-type-toggle {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 15px 0;
        }
        .toggle-btn {
            padding: 10px 24px;
            font-size: 0.95rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .toggle-btn:hover {
            border-color: var(--text-accent);
            color: var(--text-primary);
        }
        .toggle-btn.active {
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border-color: var(--btn-bg);
            font-weight: 600;
        }
        .data-version-badge {
            text-align: center;
            color: var(--text-accent);
            font-size: 0.85rem;
            font-weight: 500;
            margin: 10px 0;
            padding: 6px 12px;
            background-color: rgba(100, 255, 218, 0.1);
            border-radius: 6px;
            display: inline-block;
        }

        .search-button,
        .clear-button {
            padding: 12px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .search-button {
            background-color: var(--btn-bg);
            color: var(--btn-text);
            font-weight: 600;
        }

        .search-button:hover {
            background-color: var(--btn-hover);
        }

        .clear-button {
            background-color: var(--bg-secondary);
            color: var(--text-secondary);
            padding: 12px 16px;
        }

        .clear-button:hover {
            background-color: var(--border-color);
            color: var(--text-primary);
        }

        .searching-indicator {
            color: var(--text-accent);
            font-size: 0.9rem;
        }

        .search-results-count {
            color: var(--text-accent);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .main-content {
            background-color: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            min-height: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .tree-view {
            font-size: 0.95rem;
        }

        .tree-node {
            margin: 2px 0;
        }

        .tree-node-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 4px;
            cursor: default;
            transition: background-color 0.2s;
        }

        .tree-node-header:hover {
            background-color: var(--bg-hover);
        }

        .tree-node-header[role="button"] {
            cursor: pointer;
        }

        .tree-node-header[role="button"]:hover {
            background-color: rgba(100, 255, 218, 0.1);
        }

        .expand-icon {
            font-size: 0.7rem;
            color: var(--text-accent);
            width: 16px;
            text-align: center;
            flex-shrink: 0;
        }

        .node-icon {
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .node-name {
            flex: 1;
            font-weight: 500;
        }

        .works-count {
            color: var(--text-secondary);
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .node-stats {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-left: 10px;
        }

        .stat-item {
            color: var(--text-accent);
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .openalex-btn {
            background: none;
            border: 1px solid var(--text-accent);
            border-radius: 4px;
            cursor: pointer;
            padding: 2px 6px;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .openalex-btn:hover {
            background-color: var(--text-accent);
            color: var(--bg-primary);
        }

        .tree-children {
            margin-top: 2px;
        }

        .highlight {
            background-color: var(--highlight-bg);
            color: var(--highlight-text);
            padding: 0 2px;
            border-radius: 2px;
            font-weight: 600;
        }

        .highlighted {
            background-color: var(--highlight-node-bg) !important;
            border-left: 3px solid var(--highlight-node-border);
            padding-left: 5px;
        }

        /* Type-based styles */
        [data-type="domain"] .node-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-accent);
        }

        [data-type="field"] .node-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-accent-secondary);
        }

        [data-type="subfield"] .node-name {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-subfield);
        }

        [data-type="topic"] .node-name {
            font-size: 0.95rem;
            font-weight: 400;
            color: var(--text-title);
        }

        [data-type="concept"] .node-name {
            font-size: 0.95rem;
            font-weight: 400;
            color: var(--text-title);
        }

        [data-type="domain"] .node-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-accent);
        }

        /* Scrollbar styles */
        .main-content::-webkit-scrollbar {
            width: 10px;
        }

        .main-content::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
            border-radius: 5px;
        }

        .main-content::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 5px;
        }

        .main-content::-webkit-scrollbar-thumb:hover {
            background: var(--scrollbar-thumb-hover);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app {
                padding: 15px;
            }

            .hero-title {
                font-size: 2rem;
            }

            .search-bar {
                flex-direction: column;
            }

            .main-content {
                padding: 15px;
            }
        }
    </style>
</head>

                conceptFeature3: '19のルート分野から専門分野への分岐',

                topicsTreeDesc: 'トピックは 4 段階の階層で構成されています：',
                conceptsTreeDesc: 'コンセプトは 19 のルート分野から始まる親子階層で構成されています：',

                usageTip1: 'ノードを展開してサブカテゴリを探索',
                usageTip2: '検索で一致するトピックをフィルタリング＆ハイライト',
                usageTip3: '各ノードに作品数とトピック数を表示',
                jumpButton: 'トピックツリーを閲覧',
                conceptsJumpButton: 'コンセプトツリーを閲覧',
                searchPlaceholder: 'トピック、キーワード、ドメインを検索...',
                searchConceptsPlaceholder: 'コンセプトを検索...',
                searchButton: '検索',
                searching: '検索中...',
                foundTopics: (count) => `${count} 件のトピックが見つかりました`,
                foundConcepts: (count) => `${count} 件のコンセプトが見つかりました`,
                loading: 'ツリーデータを読み込み中...',
                worksCountTitle: 'このカテゴリの総作品数',
                topicCountTitle: 'トピック数',
                conceptCountTitle: 'コンセプト数',
                openAlexTitle: 'OpenAlex で作品を表示',
                languageLabel: '言語',
                themeLabel: 'テーマ',
                darkTheme: 'ダーク',
                lightTheme: 'ライト'
            }
        };

        function useI18n() {
            const [lang, setLang] = useState(() => {
                const saved = localStorage.getItem('openalex-lang');
                return saved || 'en';
            });

            useEffect(() => {
                localStorage.setItem('openalex-lang', lang);
                document.documentElement.lang = lang;
            }, [lang]);

            const t = useCallback((key) => {
                const dict = translations[lang] || translations.en;
                return dict[key] !== undefined ? dict[key] : (translations.en[key] || key);
            }, [lang]);

            return { lang, setLang, t };
        }

        function useTheme() {
            const [theme, setTheme] = useState(() => {
                const saved = localStorage.getItem('openalex-theme');
                return saved || 'dark';
            });

            useEffect(() => {
                localStorage.setItem('openalex-theme', theme);
                document.documentElement.setAttribute('data-theme', theme);
            }, [theme]);

            return { theme, setTheme };
        }

        // CSV 解析器 (RFC 4180)
        function parseCSV(text) {
            const lines = text.trim().split('\n');
            if (lines.length < 2) return [];
            const headers = parseCSVLine(lines[0]);
            return lines.slice(1).filter(l => l.trim()).map(line => {
                const values = parseCSVLine(line);
                const row = {};
                headers.forEach((h, i) => { row[h] = values[i] || ''; });
                return row;
            });
        }
        function parseCSVLine(line) {
            const fields = [];
            let i = 0;
            while (i <= line.length) {
                if (i === line.length) { break; }
                if (line[i] === '"') {
                    let val = ''; i++;
                    while (i < line.length) {
                        const qi = line.indexOf('"', i);
                        if (qi === -1) { val += line.slice(i); i = line.length; break; }
                        if (qi + 1 < line.length && line[qi + 1] === '"') { val += line.slice(i, qi) + '"'; i = qi + 2; }
                        else { val += line.slice(i, qi); i = qi + 1; break; }
                    }
                    fields.push(val);
                    if (i < line.length && line[i] === ',') i++;
                } else {
                    const ci = line.indexOf(',', i);
                    if (ci === -1) { fields.push(line.slice(i)); break; }
                    else { fields.push(line.slice(i, ci)); i = ci + 1; }
                }
            }
            return fields;
        }

        // Fetch data — topics and concepts are completely independent
        // Tree data (skeleton) loads immediately for rendering
        // Search index loads lazily only when user searches
        let topicsTreeData = null;
        let topicsSearchData = null;
        let topicsLookupMap = null;
        let conceptsTreeData = null;
        let conceptsSearchData = null;
        let dataVersions = { topics: '', concepts: '' };
        let searchLoading = { topics: false, concepts: false };
        let searchLoaded = { topics: false, concepts: false };

        // Load only tree skeleton for immediate rendering
        async function loadTopicsTree() {
            if (topicsTreeData) return;
            try {
                const treeRes = await fetch('/data/tree-skeleton.json');
                topicsTreeData = await treeRes.json();
                if (topicsTreeData.version) dataVersions.topics = topicsTreeData.version;
                if (topicsTreeData.children && !topicsTreeData.version) {
                    topicsTreeData = { ...topicsTreeData, version: '', generated_at: '' };
                }
                console.log('Topics tree loaded:', topicsTreeData.name);
            } catch (error) {
                console.error('Failed to load topics tree:', error);
            }
        }

        // Load search index lazily — only called when user actually searches
        async function ensureTopicsSearchData() {
            if (searchLoaded.topics || searchLoading.topics) return;
            searchLoading.topics = true;
            try {
                // Load lookup table + search index in parallel
                const [lookupRes, searchRes] = await Promise.all([
                    fetch('/data/lookup.csv'),
                    fetch('/data/search-index.csv')
                ]);
                const lookupCsv = await lookupRes.text();
                const lookupRows = parseCSV(lookupCsv);
                topicsLookupMap = {};
                for (const row of lookupRows) {
                    topicsLookupMap[row.id] = row.name;
                }

                const searchCsv = await searchRes.text();
                topicsSearchData = parseCSV(searchCsv).map(row => ({
                    id: row.id,
                    name: row.name,
                    domain: topicsLookupMap[row.did] || row.did,
                    field: topicsLookupMap[row.fid] || row.fid,
                    subfield: topicsLookupMap[row.sid] || row.sid,
                    works_count: parseInt(row.works_count, 10) || 0
                }));
                searchLoaded.topics = true;
                console.log('Topics search data loaded:', topicsSearchData.length, 'entries');
            } catch (error) {
                console.error('Failed to load topics search data:', error);
            } finally {
                searchLoading.topics = false;
            }
        }

        // Load only tree skeleton for immediate rendering
        async function loadConceptsTree() {
            if (conceptsTreeData) return;
            try {
                const treeRes = await fetch('/data/concepts/tree-skeleton.json');
                const raw = await treeRes.json();
                if (raw.version) dataVersions.concepts = raw.version;
                
                // Add type field to concept nodes
                const addType = (node) => {
                    if (!node.type) {
                        if (node.level === 0) node.type = 'domain';
                        else if (node.level === 1) node.type = 'field';
                        else node.type = 'concept';
                    }
                    if (node.children) {
                        node.children.forEach(addType);
                    }
                    return node;
                };
                
                conceptsTreeData = {
                    ...raw,
                    tree: raw.tree.map(addType)
                };
                console.log('Concepts tree loaded:', conceptsTreeData.tree.length, 'roots');
            } catch (error) {
                console.error('Failed to load concepts tree:', error);
            }
        }

        // Load search index lazily — only called when user actually searches
        async function ensureConceptsSearchData() {
            if (searchLoaded.concepts || searchLoading.concepts) return;
            searchLoading.concepts = true;
            try {
                const searchRes = await fetch('/data/concepts/search-index.json');
                conceptsSearchData = await searchRes.json();
                searchLoaded.concepts = true;
                console.log('Concepts search data loaded:', conceptsSearchData.length, 'entries');
            } catch (error) {
                console.error('Failed to load concepts search data:', error);
            } finally {
                searchLoading.concepts = false;
            }
        }

        // Unified lazy search data loader
        async function ensureSearchData(type) {
            if (type === 'topics') {
                await ensureTopicsSearchData();
            } else {
                await ensureConceptsSearchData();
            }
        }

        // Topic children cache for lazy loading
        const topicCache = new Map();

        // TreeNode Component
        function TreeNodeComponent({ node, level, defaultExpandLevel, expandedNodes, searchResults, searchQuery, t }) {
            // Use node.id as key to force re-render when expandedNodes changes
            const [isExpanded, setIsExpanded] = useState(() => {
                if (expandedNodes && expandedNodes.has(node.name)) {
                    return true;
                }
                return defaultExpandLevel ? level < defaultExpandLevel : false;
            });
            const [children, setChildren] = useState(node.children || []);
            const [isLoading, setIsLoading] = useState(false);
            const [isLoaded, setIsLoaded] = useState(false);
            const [visibleCount, setVisibleCount] = useState(100); // Pagination for large concept lists
            const CONCEPT_PAGE_SIZE = 100;

            // Sync children state when node.children prop changes (e.g. switching topics↔concepts)
            useEffect(() => {
                setChildren(node.children || []);
                setIsLoaded(false);
            }, [node.children]);

            // Update expansion state when expandedNodes changes
            useEffect(() => {
                if (expandedNodes && expandedNodes.has(node.name)) {
                    setIsExpanded(true);
                }
            }, [expandedNodes, node.name]);

            const hasTopicFile = node._topic_file;
            const hasConceptFile = node._concept_file;
            const hasChildren = children.length > 0 || hasTopicFile || hasConceptFile;
            
            const isHighlighted = searchResults && searchResults.some(r => 
                r.path.includes(node.name) || r.id === node.id
            );

            // Load topic/concept children when expanded via search
            const loadChildren = async () => {
                if ((hasTopicFile || hasConceptFile) && !isLoaded && !isLoading) {
                    setIsLoading(true);
                    try {
                        const file = hasTopicFile ? node._topic_file : node._concept_file;
                        const cacheKey = file;
                        if (topicCache.has(cacheKey)) {
                            setChildren(topicCache.get(cacheKey));
                        } else {
                            const res = await fetch(file);
                            
                            if (hasConceptFile) {
                                // Concepts format: JSON array of child nodes
                                const jsonChildren = await res.json();
                                const conceptChildren = jsonChildren.map(c => ({
                                    ...c,
                                    type: c.level === 0 ? 'domain' : c.level === 1 ? 'field' : 'concept'
                                }));
                                topicCache.set(cacheKey, conceptChildren);
                                setChildren(conceptChildren);
                            } else {
                                // Topics format: CSV
                                const csvText = await res.text();
                                const csvRows = parseCSV(csvText);
                                const csvChildren = csvRows.map(row => ({
                                    id: row.id,
                                    name: row.name,
                                    type: 'topic',
                                    works_count: parseInt(row.works_count, 10) || 0,
                                    description: row.description || '',
                                    children: []
                                }));
                                topicCache.set(cacheKey, csvChildren);
                                setChildren(csvChildren);
                            }
                        }
                        setIsLoaded(true);
                    } catch (err) {
                        console.error('Failed to load children:', err);
                    } finally {
                        setIsLoading(false);
                    }
                }
            };

            const toggleExpand = async () => {
                const newExpanded = !isExpanded;
                setIsExpanded(newExpanded);

                if (newExpanded && (hasTopicFile || hasConceptFile) && !isLoaded) {
                    await loadChildren();
                }
            };

            // Auto-load topic/concept children when node is expanded by search
            useEffect(() => {
                if (isExpanded && (hasTopicFile || hasConceptFile) && !isLoaded) {
                    loadChildren();
                }
            }, [isExpanded]);

            const getIcon = () => {
                switch (node.type) {
                    case 'domain': return '🌐';
                    case 'field': return '📚';
                    case 'subfield': return '📖';
                    case 'topic': return '📄';
                    case 'concept': return '💡';
                    default: return node.works_count !== undefined ? '💡' : '📁';
                }
            };

            const openInOpenAlex = (e) => {
                e.stopPropagation();
                const topicId = node.id;
                let url;
                if (topicId.startsWith('https://openalex.org/')) {
                    url = topicId;
                } else {
                    url = `https://openalex.org/${topicId}`;
                }
                window.open(url, '_blank');
            };

            const formatNumber = (num) => {
                if (num === undefined || num === null) return '';
                if (num >= 1000000) {
                    return (num / 1000000).toFixed(1) + 'M';
                }
                if (num >= 1000) {
                    return (num / 1000).toFixed(1) + 'K';
                }
                return num.toLocaleString();
            };

            const highlightText = (text, query) => {
                if (!query || !text) return text;
                const lowerText = text.toLowerCase();
                const lowerQuery = query.toLowerCase();
                const index = lowerText.indexOf(lowerQuery);
                if (index === -1) return text;

                const before = text.slice(0, index);
                const match = text.slice(index, index + query.length);
                const after = text.slice(index + query.length);

                return React.createElement('span', null,
                    before,
                    React.createElement('span', { className: 'highlight', style: { backgroundColor: '#ffd700', color: '#000', padding: '0 2px', borderRadius: '2px' } }, match),
                    after
                );
            };

            // Filter children to only show matching paths when in search mode
            // This ensures we only show the matched nodes and their ancestors, not sibling nodes
            const filteredChildren = React.useMemo(() => {
                // If no search results, show all children normally
                if (!hasChildren || !searchResults || searchResults.length === 0) {
                    return children || [];
                }

                // Build sets for matching topics and valid paths
                const topicIds = new Set();
                
                searchResults.forEach(result => {
                    topicIds.add(result.id);
                });

                // Special case for root node: show domains that have matching topics/concepts
                if (node.type === 'root') {
                    const matchingDomains = new Set();
                    searchResults.forEach(result => {
                        if (result.path.length > 0) {
                            matchingDomains.add(result.path[0]);
                        }
                    });
                    return (node.children || []).filter(child => {
                        return matchingDomains.has(child.name);
                    });
                }

                // For topic/leaf concept nodes, check if this specific item is in the search results
                if (node.type === 'topic' || node.type === 'concept') {
                    const isMatch = topicIds.has(node.id);
                    return isMatch ? (node.children || []) : [];
                }

                // For hierarchy nodes (domain, field, subfield) in topics tree
                // Path structure: [domain(0), field(1), subfield(2), topic(3)]
                const pathIndex = node.type === 'domain' ? 0 : 
                                  node.type === 'field' ? 1 : 
                                  node.type === 'subfield' ? 2 : -1;

                // For concepts tree with variable-depth paths,
                // find the position of this node's name in each search result path
                // then filter children by whether they appear at the next position
                if (pathIndex === -1) {
                    // Variable-depth concept path matching
                    // Find which search results have this node's name in their path
                    // and then check if children appear as the next name
                    const validChildNames = new Set();
                    searchResults.forEach(result => {
                        const idx = result.path.indexOf(node.name);
                        if (idx >= 0 && idx < result.path.length - 1) {
                            validChildNames.add(result.path[idx + 1]);
                        }
                    });
                    return (children || []).filter(child => {
                        if (topicIds.has(child.id)) return true;
                        return validChildNames.has(child.name);
                    });
                }

                // Fixed-depth path matching (topics tree)
                // Check if this node appears at the correct position in any valid path
                const nodeInAnyPath = searchResults.some(result => {
                    if (result.path.length <= pathIndex) return false;
                    return result.path[pathIndex] === node.name;
                });

                if (!nodeInAnyPath) {
                    return [];
                }

                // This node is in a valid path at the correct position
                // Show only children that are also in valid paths
                // Children are always at pathIndex + 1 in the path array
                const childPathIndex = pathIndex + 1;
                const validChildNames = new Set();
                
                searchResults.forEach(result => {
                    // Check if this result's path matches the current node's position
                    if (result.path.length > pathIndex && result.path[pathIndex] === node.name) {
                        // The next element in the path is a valid child
                        if (result.path.length > childPathIndex) {
                            validChildNames.add(result.path[childPathIndex]);
                        }
                    }
                });

                return (children || []).filter(child => {
                    // For topic/concept children, check by ID
                    if (child.type === 'topic' || child.type === 'concept') {
                        return topicIds.has(child.id);
                    }
                    // For non-topic/concept children, check by name
                    return validChildNames.has(child.name);
                });
            }, [children, searchResults, node.name, node.type, level]);

            return React.createElement('div', {
                className: 'tree-node',
                style: { marginLeft: `${level * 20}px` },
                'data-type': node.type
            },
                React.createElement('div', {
                    className: `tree-node-header ${isHighlighted ? 'highlighted' : ''}`,
                    onClick: hasChildren ? toggleExpand : undefined,
                    role: hasChildren ? 'button' : undefined,
                    tabIndex: 0
                },
                    hasChildren && React.createElement('span', { className: 'expand-icon' }, isLoading ? '⏳' : isExpanded ? '▼' : '▶'),
                    React.createElement('span', { className: 'node-icon' }, getIcon()),
                    React.createElement('span', { className: 'node-name' }, highlightText(node.name, searchQuery)),
                    React.createElement('span', { className: 'node-stats' },
                        node.works_count !== undefined && React.createElement('span', { className: 'stat-item', title: t('worksCountTitle') },
                            `📚 ${formatNumber(node.works_count)}`
                        ),
                        node.topic_count !== undefined && React.createElement('span', { className: 'stat-item', title: t('topicCountTitle') },
                            `📄 ${node.topic_count}`
                        ),
                        node.concept_count !== undefined && React.createElement('span', { className: 'stat-item', title: t('conceptCountTitle') },
                            `💡 ${node.concept_count}`
                        ),
                        node.type !== 'root' && React.createElement('button', {
                            className: 'openalex-btn',
                            onClick: openInOpenAlex,
                            title: t('openAlexTitle')
                        }, '🔗')
                    )
                ),
                isExpanded && filteredChildren.length > 0 && React.createElement('div', { className: 'tree-children' },
                    filteredChildren.slice(0, visibleCount).map(child =>
                        React.createElement(TreeNodeComponent, {
                            key: child.id,
                            node: child,
                            level: level + 1,
                            defaultExpandLevel: defaultExpandLevel,
                            expandedNodes: expandedNodes,
                            searchResults: searchResults,
                            searchQuery: searchQuery,
                            t: t
                        })
                    ),
                    // Show "Load more" button for large concept lists
                    filteredChildren.length > visibleCount && React.createElement('div', {
                        style: { marginLeft: `${(level + 1) * 20}px`, padding: '8px', textAlign: 'center' }
                    },
                        React.createElement('button', {
                            className: 'toggle-btn',
                            style: { fontSize: '0.85rem', padding: '6px 16px' },
                            onClick: () => setVisibleCount(prev => prev + CONCEPT_PAGE_SIZE)
                        }, `Show more (${filteredChildren.length - visibleCount} remaining)`)
                    )
                )
            );
        }

        // TreeView Component
        function TreeView({ tree, defaultExpandLevel = 2, expandedNodes, searchResults, searchQuery, t }) {
            return React.createElement('div', { className: 'tree-view' },
                React.createElement(TreeNodeComponent, {
                    node: tree,
                    level: 0,
                    defaultExpandLevel: defaultExpandLevel,
                    expandedNodes: expandedNodes,
                    searchResults: searchResults,
                    searchQuery: searchQuery,
                    t: t
                })
            );
        }

        // App Component with hash-based routing
        function App() {
            const { lang, setLang, t } = useI18n();
            const { theme, setTheme } = useTheme();

            // Derive treeType from hash (#topics or #concepts)
            const [treeType, setTreeType] = useState(() => {
                const hash = window.location.hash.replace('#', '');
                return (hash === 'concepts') ? 'concepts' : 'topics';
            });
            const [tree, setTree] = useState(null);
            const [dataVersion, setDataVersion] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [isSearching, setIsSearching] = useState(false);
            const [expandedNodes, setExpandedNodes] = useState(new Set());
            const [searchQuery, setSearchQuery] = useState('');
            const [searchCounter, setSearchCounter] = useState(0);

            // Sync hash → state (back/forward navigation)
            useEffect(() => {
                const onHashChange = () => {
                    const hash = window.location.hash.replace('#', '');
                    const newType = (hash === 'concepts') ? 'concepts' : 'topics';
                    setTreeType(newType);
                };
                window.addEventListener('hashchange', onHashChange);
                return () => window.removeEventListener('hashchange', onHashChange);
            }, []);

            // Load tree skeleton only when treeType changes — fast render
            // Search index is loaded lazily on first search
            useEffect(() => {
                if (treeType === 'topics') {
                    loadTopicsTree().then(() => {
                        setTree(topicsTreeData);
                        setDataVersion(dataVersions.topics);
                    });
                } else {
                    loadConceptsTree().then(() => {
                        setTree(conceptsTreeData);
                        setDataVersion(dataVersions.concepts);
                    });
                }
                setSearchResults([]);
                setExpandedNodes(new Set());
                setSearchQuery('');
            }, [treeType]);

            // Level name lookup for concepts search path (legacy, kept for compatibility)
            const levelNames = useMemo(() => ({
                0: 'Level 0 (Top-level concepts)',
                1: 'Level 1',
                2: 'Level 2',
                3: 'Level 3',
                4: 'Level 4',
                5: 'Level 5'
            }), []);

            const searchTopics = useCallback(async (query) => {
                if (!query.trim()) {
                    setSearchResults([]);
                    setExpandedNodes(new Set());
                    return;
                }

                setIsSearching(true);

                // Lazy-load search index on first search
                await ensureSearchData(treeType);

                const lowerQuery = query.toLowerCase();

                if (treeType === 'topics') {
                    const currentSearchData = topicsSearchData;
                    if (!currentSearchData) {
                        setIsSearching(false);
                        return;
                    }
                    
                    const matches = [];
                    const MAX_RESULTS = 200;
                    
                    for (let i = 0; i < currentSearchData.length; i++) {
                        const item = currentSearchData[i];
                        if (item.name.toLowerCase().includes(lowerQuery)) {
                            const path = [item.domain, item.field, item.subfield, item.name].filter(Boolean);
                            matches.push({ id: item.id, path: path });
                            if (matches.length >= MAX_RESULTS) break;
                        }
                    }

                    const nodesToExpand = new Set();
                    matches.forEach(result => {
                        result.path.forEach(nodeName => {
                            nodesToExpand.add(nodeName);
                        });
                    });

                    setSearchResults(matches);
                    setExpandedNodes(nodesToExpand);
                    setSearchCounter(c => c + 1);
                    setIsSearching(false);
                } else {
                    // Concepts search: find matching concepts with ancestor paths
                    const currentSearchData = conceptsSearchData;
                    if (!currentSearchData) {
                        setIsSearching(false);
                        return;
                    }
                    
                    const matches = [];
                    const MAX_RESULTS = 200;
                    
                    for (let i = 0; i < currentSearchData.length; i++) {
                        const item = currentSearchData[i];
                        if (item.name.toLowerCase().includes(lowerQuery)) {
                            // Use path from search index (ancestor names)
                            const fullPath = [...(item.path || []), item.name];
                            matches.push({ id: item.id, path: fullPath, level: item.level });
                            if (matches.length >= MAX_RESULTS) break;
                        }
                    }

                    const nodesToExpand = new Set();
                    matches.forEach(result => {
                        result.path.forEach(nodeName => {
                            nodesToExpand.add(nodeName);
                        });
                    });

                    setSearchResults(matches);
                    setExpandedNodes(nodesToExpand);
                    setSearchCounter(c => c + 1);
                    setIsSearching(false);
                }
            }, [treeType]);

            // Find concept path in tree skeleton by ID
            function findConceptPath(treeNodes, targetId) {
                for (const node of treeNodes) {
                    const result = findInNode(node, targetId);
                    if (result) return result;
                }
                return [];
            }

            function findInNode(node, targetId) {
                if (node.id === targetId) {
                    return [node.name];
                }
                
                if (node.children) {
                    for (const child of node.children) {
                        const result = findInNode(child, targetId);
                        if (result) {
                            return [node.name, ...result];
                        }
                    }
                }
                
                return null;
            }

            const handleSearch = () => {
                searchTopics(searchQuery);
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    handleSearch();
                }
            };

            const handleClear = () => {
                setSearchQuery('');
                searchTopics('');
            };

            const switchTreeType = (type) => {
                if (type === treeType) return;
                window.location.hash = type;
            };

            return React.createElement('div', { className: 'app' },
                React.createElement('section', { className: 'hero-section' },
                    React.createElement('div', { className: 'settings-bar' },
                        React.createElement('select', {
                            value: lang,
                            onChange: (e) => setLang(e.target.value),
                            className: 'lang-dropdown',
                            title: t('languageLabel')
                        },
                            React.createElement('option', { value: 'en' }, 'English'),
                            React.createElement('option', { value: 'zh' }, '中文'),
                            React.createElement('option', { value: 'ja' }, '日本語')
                        ),
                        React.createElement('button', {
                            className: 'setting-btn',
                            onClick: () => setTheme(theme === 'dark' ? 'light' : 'dark'),
                            title: t('themeLabel')
                        }, theme === 'dark' ? '☀️ ' + t('lightTheme') : '🌙 ' + t('darkTheme'))
                    ),
                    React.createElement('h1', { className: 'hero-title' }, treeType === 'concepts' ? t('conceptsTitle') : t('topicsTitle')),
                    React.createElement('p', { className: 'hero-subtitle' }, treeType === 'concepts' ? t('conceptsSubtitle') : t('topicsSubtitle')),
                    dataVersion ? React.createElement('div', { className: 'data-version-badge' }, 'Data: ' + new Date(dataVersion).toLocaleString()) : null,
                    React.createElement('div', { className: 'tree-type-toggle' },
                        React.createElement('button', {
                            className: 'toggle-btn' + (treeType === 'topics' ? ' active' : ''),
                            onClick: () => switchTreeType('topics')
                        }, 'Topics'),
                        React.createElement('button', {
                            className: 'toggle-btn' + (treeType === 'concepts' ? ' active' : ''),
                            onClick: () => switchTreeType('concepts')
                        }, 'Concepts')
                    ),
                    React.createElement('div', { className: 'info-grid' },
                        React.createElement('div', { className: 'info-card' },
                            React.createElement('h3', null, '📚 ' + t('whatIsOpenAlex')),
                            React.createElement('p', null, t('openAlexDesc')),
                            React.createElement('p', null, t('learnMore'), ' ', React.createElement('a', { href: 'https://openalex.org', target: '_blank', style: { color: 'var(--text-accent)' } }, 'openalex.org'))
                        ),
                        
                        React.createElement('div', { className: 'info-card' },
                            React.createElement('h3', null, treeType === 'concepts' ? '🏷️ ' + t('whatAreConcepts') : '🏷️ ' + t('whatAreTopics')),
                            React.createElement('p', null, treeType === 'concepts' ? t('conceptsDesc') : t('topicsDesc')),
                            React.createElement('ul', null,
                                React.createElement('li', null, treeType === 'concepts' ? t('conceptFeature1') : t('topicFeature1')),
                                React.createElement('li', null, treeType === 'concepts' ? t('conceptFeature2') : t('topicFeature2')),
                                React.createElement('li', null, treeType === 'concepts' ? t('conceptFeature3') : t('topicFeature3'))
                            )
                        ),
                        
                        React.createElement('div', { className: 'info-card' },
                            React.createElement('h3', null, '🌳 ' + t('treeStructure')),
                            React.createElement('p', null, treeType === 'concepts' ? t('conceptsTreeDesc') : t('topicsTreeDesc')),
                            React.createElement('div', { className: 'hierarchy-visual' },
                                treeType === 'concepts'
                                    ? React.createElement(React.Fragment, null,
                                        React.createElement('div', { className: 'hierarchy-level' }, 
                                            React.createElement('span', { className: 'level-icon' }, '🌐'),
                                            'Domain — Top-level disciplines (e.g. Computer Science, Medicine)')
                                        ,
                                        React.createElement('div', { className: 'hierarchy-level' }, 
                                            React.createElement('span', { className: 'level-icon' }, '📚'),
                                            'Field — Major sub-disciplines (e.g. Artificial Intelligence)')
                                        ,
                                        React.createElement('div', { className: 'hierarchy-level' }, 
                                            React.createElement('span', { className: 'level-icon' }, '📖'),
                                            'Subfield — Specialized research areas')
                                        ,
                                        React.createElement('div', { className: 'hierarchy-level' }, 
                                            React.createElement('span', { className: 'level-icon' }, '📄'),
                                            'Specific concepts and instances')
                                      )
                                    : React.createElement(React.Fragment, null,
                                        React.createElement('div', { className: 'hierarchy-level' }, 
                                            React.createElement('span', { className: 'level-icon' }, '🌐'),
                                            t('hierarchyDomain')
                                        ),
                                        React.createElement('div', { className: 'hierarchy-level' }, 
                                            React.createElement('span', { className: 'level-icon' }, '📚'),
                                            t('hierarchyField')
                                        ),
                                        React.createElement('div', { className: 'hierarchy-level' }, 
                                            React.createElement('span', { className: 'level-icon' }, '📖'),
                                            t('hierarchySubfield')
                                        ),
                                        React.createElement('div', { className: 'hierarchy-level' }, 
                                            React.createElement('span', { className: 'level-icon' }, '📄'),
                                            t('hierarchyTopic')
                                        )
                                    )
                            )
                        ),
                        
                        React.createElement('div', { className: 'info-card' },
                            React.createElement('h3', null, '🔍 ' + t('howToUse')),
                            React.createElement('p', null, t('howToUseDesc')),
                            React.createElement('ul', null,
                                React.createElement('li', null, t('usageTip1')),
                                React.createElement('li', null, t('usageTip2')),
                                React.createElement('li', null, t('usageTip3'))
                            )
                        )
                    ),
                    
                    React.createElement('a', { 
                        href: '#tree-content', 
                        className: 'jump-button',
                        onClick: (e) => {
                            e.preventDefault();
                            document.getElementById('tree-content')?.scrollIntoView({ behavior: 'smooth' });
                        }
                    }, '↓ ' + (treeType === 'concepts' ? t('conceptsJumpButton') : t('jumpButton')))
                ),
                
                React.createElement('div', { className: 'search-container' },
                    React.createElement('div', { className: 'search-bar' },
                        React.createElement('input', {
                            type: 'text',
                            value: searchQuery,
                            onChange: (e) => setSearchQuery(e.target.value),
                            onKeyDown: handleKeyDown,
                            placeholder: treeType === 'concepts' ? t('searchConceptsPlaceholder') : t('searchPlaceholder'),
                            className: 'search-input'
                        }),
                        React.createElement('button', { onClick: handleSearch, className: 'search-button' }, t('searchButton')),
                        searchQuery && React.createElement('button', { onClick: handleClear, className: 'clear-button' }, '✕')
                    ),
                    isSearching && React.createElement('div', { className: 'searching-indicator' },
                        (!searchLoaded[treeType]) ? 'Loading search index...' : t('searching')
                    ),
                    searchResults.length > 0 && !isSearching && 
                        React.createElement('div', { className: 'search-results-count' }, 
                            treeType === 'concepts' ? t('foundConcepts')(searchResults.length) : t('foundTopics')(searchResults.length)
                        )
                ),
                React.createElement('main', { id: 'tree-content', className: 'main-content' },
                    tree ? 
                        React.createElement(TreeView, {
                            key: treeType + '-' + searchCounter,
                            tree: tree,
                            defaultExpandLevel: searchResults.length > 0 ? undefined : (treeType === 'concepts' ? 2 : 2),
                            expandedNodes: expandedNodes,
                            searchResults: searchResults,
                            searchQuery: searchQuery,
                            t: t
                        }) :
                        React.createElement('div', { className: 'loading' }, t('loading'))
                )
            );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
